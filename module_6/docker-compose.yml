services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: gradcafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - gradcafe_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5672"]
      interval: 5s
      timeout: 5s
      retries: 20

    networks:
      - backend

  web:
    build: ./src/web
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  worker:
    build: ./src/worker
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

volumes:
  gradcafe_data:

networks:
  backend: